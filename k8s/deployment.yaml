apiVersion: apps/v1
kind: Deployment
metadata:
  name: sports-backend-deployment
  labels:
    app: sports-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sports-platform
  template:
    metadata:
      labels:
        app: sports-platform
    spec:
      containers:
        - name: backend
          image: ghcr.io/Chuuch/sports-platform-backend:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1000m"
              memory: "1024Mi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resend-secrets
                  key: api-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sports-backend-service
spec:
  type: ClusterIP
  selector:
    app: sports-platform
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080