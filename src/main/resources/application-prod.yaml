spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
logging:
  structured:
    format: ecs
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  email:
    from: ${RESEND_FROM_EMAIL}
    resend:
      api-key: ${RESEND_API_KEY}
management:
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
  endpoint:
    health:
      probes:
        enabled: true
    audit-events:
      id: audit-events
  endpoints:
    enabled: false
    web:
      exposure:
        include: "health,prometheus"
  metrics:
    export:
      prometheus:
        enabled: true