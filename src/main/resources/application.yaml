spring:
  application:
    name: sportly
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    Hikari:
      pool-name: SportsPlatform-HikariCP
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      JDBC:
        batch_size: 25
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
server:
  port: 8080
  shutdown: graceful

management:
  tracing:
    sampling:
      probability: 1.0
  Zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: health, info, Prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
app:
  email:
    from: "onboarding@resend.dev"
    resend:
      api-key: "re_local_dev_key"