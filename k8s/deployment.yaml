apiVersion: v1
kind: ConfigMap
metadata:
  name: sports-backend-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  DB_URL: "jdbc:postgresql://postgres-service:5432/sportly"
  DB_USERNAME: "postgres"
  RESEND_FROM_EMAIL: "onboarding@resend.dev"
  ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sports-backend-deployment
  labels:
    app: sports-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sports-platform
  template:
    metadata:
      labels:
        app: sports-platform
    spec:
      containers:
        - name: backend
          image: ghcr.io/chuuch/sports-platform-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          env:
            # ... keep your existing env vars ...
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              valueFrom:
                configMapKeyRef:
                  name: sports-backend-config
                  key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: sports-backend-config
                  key: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sports-backend-service
spec:
  type: ClusterIP
  selector:
    app: sports-platform
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080